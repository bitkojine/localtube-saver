name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --filter localtube-desktop

      - name: Lint
        run: pnpm run lint
        working-directory: apps/desktop

      - name: Build TypeScript
        run: pnpm run build:ts
        working-directory: apps/desktop

      - name: Build Electron app (no publish)
        run: pnpm exec electron-builder --publish=never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: Smoke test packaged Windows app
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $exePath = Join-Path (Resolve-Path dist/win-unpacked).Path 'LocalTube Saver.exe'
          if (!(Test-Path $exePath)) {
            throw "Smoke test executable not found at $exePath"
          }

          $process = Start-Process -FilePath $exePath -ArgumentList '--smoke-test' -PassThru
          if (!$process.WaitForExit(90000)) {
            try {
              Stop-Process -Id $process.Id -Force
            } catch {
            }
            throw "Smoke test timed out after 90 seconds"
          }

          if ($process.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($process.ExitCode)"
          }

      - name: Print Windows smoke logs
        if: matrix.os == 'windows-latest' && failure()
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $logDir = Join-Path (Resolve-Path dist/win-unpacked).Path 'resources/logs'
          if (Test-Path $logDir) {
            Get-ChildItem $logDir -File | Sort-Object LastWriteTime | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="
              Get-Content $_.FullName
            }
          } else {
            Write-Host "Smoke log directory not found at $logDir"
          }

      - name: Upload Windows smoke logs
        if: matrix.os == 'windows-latest' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-logs
          path: |
            apps/desktop/dist/win-unpacked/resources/logs/**
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: apps/desktop/dist/*
          if-no-files-found: warn
