name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.calc_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Calculate new version
        id: calc_version
        shell: bash
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"
          CURRENT_VERSION=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          NEXT_VERSION=$(node -e "
            const semver = '$CURRENT_VERSION'.split('.').map(Number);
            const type = '$BUMP_TYPE';
            if (type === 'major') { semver[0]++; semver[1] = 0; semver[2] = 0; }
            else if (type === 'minor') { semver[1]++; semver[2] = 0; }
            else { semver[2]++; }
            console.log(semver.join('.'));
          ")
          
          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION="${{ steps.calc_version.outputs.version }}"
          echo "Updating version to $VERSION"
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8')); pkg.version = '$VERSION'; fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Commit and Push Version Change
        run: |
          git add apps/desktop/package.json
          git diff --staged --quiet || (git commit -m "chore: bump version to v${{ steps.calc_version.outputs.version }}" && git push)

      - name: Create and Push Tag
        run: |
          TAG="v${{ steps.calc_version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  release_build:
    needs: tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.tag.outputs.new_version }}
          fetch-depth: 0

      - name: Create Release (if not exists)
        shell: bash
        run: |
          TAG="v${{ needs.tag.outputs.new_version }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating draft release for $TAG"
            gh release create "$TAG" --title "Release $TAG" --draft --notes "Automated release for $TAG"
          else
            echo "Release $TAG already exists."
          fi

      - name: Verify Tag
        run: |
          git describe --tags --always
          echo "GITHUB_REF is $GITHUB_REF"
          git log -1 --format=%s

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --filter localtube-desktop

      - name: Build TypeScript
        run: pnpm run build:ts
        working-directory: apps/desktop

      - name: Build Electron app
        run: pnpm exec electron-builder --publish=never
        working-directory: apps/desktop
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Smoke test installed Windows app
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          Write-Host "Checking contents of dist directory:"
          Get-ChildItem dist | Select-Object Name, Length, LastWriteTime

          $installer = Get-ChildItem dist -Filter 'LocalTube-Saver-Setup-*.exe' | Select-Object -First 1
          if (!$installer) {
            throw 'Windows installer not found in dist/'
          }
          Write-Host "Found installer: $($installer.FullName)"

          $installRoot = Join-Path $env:LOCALAPPDATA 'Programs'
          Write-Host "Installing to $installRoot"
          $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList '/S' -PassThru
          if (!$installProcess.WaitForExit(120000)) {
            try {
              Stop-Process -Id $installProcess.Id -Force
            } catch {
            }
            throw 'Installer timed out after 120 seconds'
          }

          if ($installProcess.ExitCode -ne 0) {
            throw "Installer failed with exit code $($installProcess.ExitCode)"
          }
          Write-Host "Installation completed successfully"

          $installedExe = Get-ChildItem $installRoot -Recurse -Filter 'LocalTube Saver.exe' -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (!$installedExe) {
            Write-Host "Error: Could not find LocalTube Saver.exe in $installRoot"
            Get-ChildItem $installRoot -Recurse | Select-Object FullName
            throw 'Installed LocalTube Saver.exe not found'
          }
          Write-Host "Found installed exe: $($installedExe.FullName)"

          Write-Host "Starting smoke test..."
          # The logs are expected in the 'logs' sub-folder of where the exe is located
          $smokeLogDir = Join-Path (Split-Path $installedExe.FullName) 'logs'
          Write-Host "Expected smoke log directory: $smokeLogDir"

          $smokeProcess = Start-Process -FilePath $installedExe.FullName -ArgumentList '--smoke-test' -PassThru -NoNewWindow
          if (!$smokeProcess.WaitForExit(60000)) {
            try {
              Stop-Process -Id $smokeProcess.Id -Force
            } catch {
            }
            throw 'Installed app smoke test timed out after 60 seconds'
          }

          if (Test-Path $smokeLogDir) {
            Write-Host "Found smoke logs at $smokeLogDir"
            Get-ChildItem $smokeLogDir -File | ForEach-Object {
              Write-Host "===== $($_.Name) ====="
              Get-Content $_.FullName
            }
          } else {
            Write-Host "Warning: Smoke log directory not found at $smokeLogDir"
          }

          if ($smokeProcess.ExitCode -ne 0) {
            throw "Installed app smoke test failed with exit code $($smokeProcess.ExitCode)"
          }
          Write-Host "Smoke test completed successfully"

      - name: Upload release assets from macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          TAG="v${{ needs.tag.outputs.new_version }}"
          files="$(find apps/desktop/dist -maxdepth 1 -type f ! -name 'builder-debug.yml' -print)"
          if [ -z "$files" ]; then
            echo "No macOS release assets found"
            exit 1
          fi
          find apps/desktop/dist -maxdepth 1 -type f ! -name 'builder-debug.yml' -print0 | xargs -0 gh release upload "$TAG" --clobber

      - name: Upload release assets from Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $tag = 'v${{ needs.tag.outputs.new_version }}'
          Write-Host "Uploading assets for tag: $tag"
          $files = Get-ChildItem dist -File | Where-Object { $_.Name -ne 'builder-debug.yml' -and $_.Attributes -ne 'Directory' } | Select-Object -ExpandProperty FullName
          if (!$files -or $files.Count -eq 0) {
            Write-Host "Warning: No Windows release assets found in dist/"
            Get-ChildItem dist | Select-Object Name
            throw 'No Windows release assets found'
          }
          foreach ($file in $files) {
            Write-Host "Uploading: $file"
            gh release upload $tag $file --clobber
          }

      - name: Collect Windows smoke logs
        if: matrix.os == 'windows-latest' && failure()
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $destination = Join-Path (Resolve-Path dist).Path 'windows-installed-logs'
          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          
          # Search for logs directory in the Programs install root
          $installRoot = Join-Path $env:LOCALAPPDATA 'Programs'
          if (Test-Path $installRoot) {
            $logDirs = Get-ChildItem $installRoot -Recurse -Directory -Filter logs -ErrorAction SilentlyContinue
            foreach ($dir in $logDirs) {
              $destSubDir = Join-Path $destination $dir.Parent.Name
              New-Item -ItemType Directory -Path $destSubDir -Force | Out-Null
              Copy-Item -Path (Join-Path $dir.FullName '*') -Destination $destSubDir -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload Windows smoke logs
        if: matrix.os == 'windows-latest' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-smoke-logs
          path: |
            apps/desktop/dist/windows-installed-logs/**
          if-no-files-found: ignore

  finalize_release:
    needs:
      - tag
      - release_build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Finalize Release
        shell: bash
        run: |
          TAG="v${{ needs.tag.outputs.new_version }}"
          echo "Publishing release $TAG"
          gh release edit "$TAG" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
