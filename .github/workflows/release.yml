name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.calc_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate new version
        id: calc_version
        shell: bash
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"
          CURRENT_VERSION=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          NEXT_VERSION=$(node -e "
            const semver = '$CURRENT_VERSION'.split('.').map(Number);
            const type = '$BUMP_TYPE';
            if (type === 'major') { semver[0]++; semver[1] = 0; semver[2] = 0; }
            else if (type === 'minor') { semver[1]++; semver[2] = 0; }
            else { semver[2]++; }
            console.log(semver.join('.'));
          ")
          
          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION="${{ steps.calc_version.outputs.version }}"
          echo "Updating version to $VERSION"
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8')); pkg.version = '$VERSION'; fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Commit and Push Version Change
        run: |
          git add apps/desktop/package.json
          git diff --staged --quiet || (git commit -m "chore: bump version to v${{ steps.calc_version.outputs.version }}" && git push)

      - name: Create and Push Tag
        run: |
          TAG="v${{ steps.calc_version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  release:
    needs: tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.new_version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --filter localtube-desktop

      - name: Build and Publish Electron app
        run: pnpm run build -- --publish=always
        working-directory: apps/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder
